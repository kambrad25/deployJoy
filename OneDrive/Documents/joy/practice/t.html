<script>



let isDragging = false;
let lastX, lastY;
let velocityX = 0, velocityY = 0;
// let document = document.getElementById('scroll-area');

// Prevent default browser scroll for full control
document.body.style.touchAction = 'none';

document.addEventListener('touchstart', (e) => {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    // Stop any ongoing inertia animation
    cancelAnimationFrame(inertiaFrameId); 
    velocityX = velocityY = 0; // Reset velocity
});

document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const currentX = e.touches[0].clientX;
    const currentY = e.touches[0].clientY;
    const deltaX = currentX - lastX;
    const deltaY = currentY - lastY;

    // Move the content directly (or use transform)
    document.scrollLeft -= deltaX;
    document.scrollTop -= deltaY;

    // Update velocity (simple diff for now, can be more complex)
    velocityX = deltaX;
    velocityY = deltaY;

    

    lastX = currentX;
    lastY = currentY;
});

let inertiaFrameId;

document.addEventListener('touchend', () => {
    isDragging = false;
    // Start inertia if it was a fling (e.g., velocity > threshold)
    if (Math.abs(velocityX) > 2 || Math.abs(velocityY) > 2) {
        animateInertia();
    }
});

let pos=0;

function animateInertia() {
    // Damping factor (e.g., 0.9 for gradual stop)
    const damping = .85; 
    velocityX *= damping;
    velocityY *= damping;

    if (velocityY < .5) {
        pos += 1 / 5;
    } else {
        pos -=1;
    }

    log (pos)
    // Apply movement
    document.body.scrollLeft -= velocityX;
    document.body.scrollTop -= velocityY;

    // Stop when slow enough
    if (Math.abs(velocityX) > 0.1 || Math.abs(velocityY) > .00005) {
        inertiaFrameId = requestAnimationFrame(animateInertia);
    }
}


document.addEventListener("wheel", (e) => {
    e.preventDefault();

    let y = e.deltaY / 120;

    pos += y;

    log ("scroll", pos)
}, { passive: false });

</script>
