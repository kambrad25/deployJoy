<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        html,body{
            height: 100%;
        }
        body {
            height: 200vh;
        }
        .d {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate3d(-50%,-50%,0);
            width: 100%;
            height: 100%;
            border: 1px solid red;
            text-align: center;
            align-content: center;
        }
        .d > * {
            /* font-weight: 900; */
            display: inline-block;
            opacity: .1;
            transition: opacity 650ms ease;
            font-size: 4rem;
            margin: 0 .2rem;
        }
        .t {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: .5px;
        }
    </style>
</head>
<body>
    <div class="t"></div>
    <div class="d">
        <div>Kam</div>
        <div>is</div>
        <div>26</div>
        <div>years</div>
        <div>old.</div>
    </div>
</body>
<script>
    const { log } = console;

    function lerp (s,t,e) {
        return s + (t - s) * e;
    }
    window.addEventListener("scroll", (e) => {
        let y = window.pageYOffset;

        let { top, height } = document.querySelector(".d").getBoundingClientRect();

        let delta = (1 - top) / height;

        let le = lerp(0, 10, delta);
        

        [...document.querySelectorAll(".d > *")].map((u, idx) => {
            if (idx <= le) {
                u.style.opacity=1;
            } else {
                u.style.opacity=.3;
            }
        })
    })

</script>
</html>
