        <title>SVG</title>
        <style>
            *{
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }

            .box {
                width: calc(100% - 100px);
                height: 50%;
                /* aspect-ratio: 1; */
                margin: auto;
                position: absolute;
                /* top: 110px; */
                transform: translate(5%, 25%);
                border: 1px solid;
            }
            .box > *:first-child {
                position: absolute;
                top: 20%;
                left: 50%;
                transform: translate3d(-50%, 0, 0);
                text-align: center;
                font-family: sans-serif;
                font-weight: 100;
                text-transform: uppercase;
                font-size: 1.4rem;
            }
            svg {
                border: 2px solid red;
                width: 100%;
                height: 100%;
            }
            #path {
                stroke-dasharray: 669;
                stroke-dashoffset: 669;
            }
        </style>
    </head>

        <script>
            const { log } = console;

            let path = document.querySelector("#path");


            log (path.getTotalLength())

            let id, s = 0, mx= .3;
            let t=0;

            function m() {

                
                s += 1 * mx;

                path.style.strokeDashoffset = s;

                id = requestAnimationFrame(m);
            }

            document.addEventListener("click", (e) => {
                t += 1;

                log (t);

                if (t > 1) {
                    t = 0;
                }



                if (t == 1) {
                    mx = 5;
                } else {
                    mx = .1;
                }
            })


            window.addEventListener("resize", (e) => {
                let b = document.querySelector(".box");

                let { width, height } = b.getBoundingClientRect();

                document.querySelector("svg").setAttribute("viewBox",`0 0 ${width} ${height}`);

                document.querySelector("#path").setAttribute("d", `M0 ${height / 2} H${width}`)
            })
            id = requestAnimationFrame(m);
